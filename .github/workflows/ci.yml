name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install inkex numpy pytest

      - name: Validate INX is well-formed XML
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('despeckle.inx')"

      - name: Byte-compile sources
        run: python -m compileall -q despeckle.py install.py

      - name: Run tests
        run: python -m pytest -q
